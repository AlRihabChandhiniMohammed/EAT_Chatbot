<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edualttech AI Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root { --primary-gradient: linear-gradient(145deg, #6c5ce7, #00b894); }
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }

    #chatbot-toggle {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--primary-gradient); color: white;
      padding: 1rem; border-radius: 9999px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      cursor: pointer; z-index: 1001;
      transition: transform 0.2s;
    }
    #chatbot-toggle:hover { transform: scale(1.1); }

    #chatbot-container {
      position: fixed; bottom: 24px; right: 24px;
      width: 92%; max-width: 430px;
      height: 660px; max-height: 85vh;
      background-color: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      display: none; flex-direction: column;
      z-index: 1000; overflow: hidden;
      animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    #chatbot-container.open { display: flex; }

    #chat-header {
      padding: 1rem 1.25rem;
      background: var(--primary-gradient);
      color: white;
      display: flex; justify-content: space-between; align-items: center;
    }

    #chat-messages {
      flex: 1; padding: 1.25rem;
      overflow-y: auto; display: flex; flex-direction: column; gap: 1rem;
      background-color: #f8fafc;
      transition: background-color 0.3s;
    }

    .message-bubble {
      padding: 0.75rem 1rem;
      border-radius: 1.25rem;
      max-width: 85%;
      font-size: 0.95rem;
      word-wrap: break-word;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .user-message { background-color: #4c70ff; color: white; align-self: flex-end; border-bottom-right-radius: 0.25rem; }
    .ai-message { background-color: #e2e8f0; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 0.25rem; }
    .error-message { background-color: #fee2e2; color: #b91c1c; align-self: center; font-size: 0.8rem; padding: 0.5rem; border-radius: 0.5rem; text-align: center; width: 92%; }

    #chat-input-container {
      padding: 0.9rem;
      background: white;
      border-top: 1px solid #e2e8f0;
      display: flex; gap: 0.5rem; align-items: center;
    }

    #user-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 9999px;
      border: 1px solid #cbd5e1;
      outline: none;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: #6c5ce7; }
    #user-input:disabled { background-color: #f1f5f9; cursor: not-allowed; }

    .dots { display: flex; gap: 4px; padding: 12px; }
    .dot { width: 8px; height: 8px; background: #94a3b8; border-radius: 50%; animation: bounce 1.4s infinite; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

    #settings-panel {
      position: absolute; inset: 0;
      background: white;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 20;
      padding: 1.25rem;
      display: flex; flex-direction: column;
    }
    #settings-panel.open { transform: translateX(0); }

    .setting-btn {
      padding: 0.4rem 0.8rem;
      border-radius: 9999px;
      border: 1px solid #e2e8f0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
    }
    .setting-btn:hover { border-color: #6c5ce7; }
    .setting-btn.active { background: #6c5ce7; color: white; border-color: #6c5ce7; }

    .small-btn {
      padding: 0.55rem 0.8rem;
      border-radius: 0.85rem;
      border: 1px solid #e2e8f0;
      font-size: 0.85rem;
      cursor: pointer;
      background: #fff;
      transition: all 0.2s;
    }
    .small-btn:hover { border-color: #6c5ce7; }

    .chip { font-size: 0.75rem; padding: 0.2rem 0.55rem; border-radius: 9999px; background: rgba(255,255,255,0.18); }
  </style>
</head>

<body>
  <div id="chatbot-toggle" title="Open Chat">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
  </div>

  <div id="chatbot-container">
    <div id="chat-header">
      <div>
        <h3 class="font-bold text-lg leading-tight">Edualttech AI</h3>
        <p class="text-xs opacity-90">Online • Learn Beyond Books <span id="mode-chip" class="chip ml-1">General</span></p>
      </div>
      <div class="flex gap-2">
        <button id="settings-trigger" class="hover:opacity-70 transition-opacity" title="Settings">⚙️</button>
        <button id="close-btn" class="hover:opacity-70 transition-opacity" title="Close">✖️</button>
      </div>
    </div>

    <div id="chat-messages">
      <div class="ai-message message-bubble">Welcome! I'm your Edualttech Assistant. How can I help you learn beyond books today? 🎓</div>
    </div>

    <div id="chat-input-container">
      <button id="pdf-btn" class="small-btn" title="Upload PDF to summarize">📄</button>
      <input type="file" id="pdf-input" accept="application/pdf" style="display:none" />
      <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" />
      <button id="send-btn" class="bg-indigo-600 text-white p-2 rounded-full hover:bg-indigo-700 disabled:opacity-50 transition-all" title="Send">➤</button>
    </div>

    <div id="settings-panel">
      <h4 class="font-bold text-lg mb-3">Chat Customization 🎨</h4>

      <label class="text-sm font-medium mb-2 block text-gray-600">Mode</label>
      <div class="flex gap-2 flex-wrap mb-4" id="mode-selectors">
        <button class="setting-btn active" data-mode="general">General</button>
        <button class="setting-btn" data-mode="study">Study Plan 📚</button>
        <button class="setting-btn" data-mode="resume">Resume 💼</button>
        <button class="setting-btn" data-mode="projects">Projects 🧠</button>
      </div>

      <label class="text-sm font-medium mb-2 block text-gray-600">Background Theme</label>
      <div class="flex gap-2 flex-wrap mb-4" id="theme-selectors">
        <button class="setting-btn active" data-color="#f8fafc">Default</button>
        <button class="setting-btn" data-color="#fef2f2">Soft Red</button>
        <button class="setting-btn" data-color="#f0fdf4">Light Green</button>
        <button class="setting-btn" data-color="#eff6ff">Cool Blue</button>
      </div>

      <button id="settings-close" class="mt-auto w-full py-2 bg-gray-100 rounded-lg hover:bg-gray-200 font-medium transition-colors">
        Back to Chat
      </button>
    </div>
  </div>

  <script>
    // ✅ CHANGE THIS TO YOUR RENDER WEB SERVICE URL
    const BACKEND_BASE = "https://eat-chatbot.onrender.com";

    const toggle = document.getElementById('chatbot-toggle');
    const container = document.getElementById('chatbot-container');
    const closeBtn = document.getElementById('close-btn');
    const chatMessages = document.getElementById('chat-messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const settingsTrigger = document.getElementById('settings-trigger');
    const settingsPanel = document.getElementById('settings-panel');
    const settingsClose = document.getElementById('settings-close');
    const modeChip = document.getElementById('mode-chip');

    const pdfBtn = document.getElementById("pdf-btn");
    const pdfInput = document.getElementById("pdf-input");

    let isBusy = false;
    let chatHistory = [];
    let currentMode = "general";

    const modeLabel = (m) => {
      if (m === "study") return "Study Plan 📚";
      if (m === "resume") return "Resume 💼";
      if (m === "projects") return "Projects 🧠";
      return "General";
    };

    toggle.onclick = () => {
      container.classList.add('open');
      toggle.style.display = 'none';
      setTimeout(() => userInput.focus(), 100);
    };

    closeBtn.onclick = () => {
      container.classList.remove('open');
      toggle.style.display = 'block';
    };

    settingsTrigger.onclick = () => settingsPanel.classList.add('open');
    settingsClose.onclick = () => settingsPanel.classList.remove('open');

    document.getElementById('theme-selectors').onclick = (e) => {
      if (e.target.dataset.color) {
        chatMessages.style.backgroundColor = e.target.dataset.color;
        document.querySelectorAll('#theme-selectors .setting-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
      }
    };

    document.getElementById('mode-selectors').onclick = (e) => {
      if (e.target.dataset.mode) {
        currentMode = e.target.dataset.mode;
        modeChip.textContent = modeLabel(currentMode);

        document.querySelectorAll('#mode-selectors .setting-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');

        chatHistory = [];
        addBubble(`Mode switched to: ${modeLabel(currentMode)} ✅`, 'ai');
      }
    };

    function cleanText(t) {
      return (t || "")
        .replace(/\*\*/g, "")
        .replace(/```/g, "")
        .replace(/^#+\s?/gm, "");
    }

    async function typewriter(div, text, speedMs = 4) {
      const cleaned = cleanText(text);
      div.textContent = "";
      for (let i = 0; i < cleaned.length; i++) {
        div.textContent += cleaned[i];
        chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'auto' });
        await new Promise(r => setTimeout(r, speedMs));
      }
    }

    function addSuggestions(options) {
      const wrap = document.createElement("div");
      wrap.className = "flex flex-wrap gap-2";

      options.forEach(text => {
        const btn = document.createElement("button");
        btn.className = "small-btn";
        btn.textContent = text;
        btn.onclick = () => {
          userInput.value = text;
          handleSend();
        };
        wrap.appendChild(btn);
      });

      chatMessages.appendChild(wrap);
      chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
    }

    function suggestionsForMode(mode) {
      if (mode === "resume") return [
        "Rewrite my resume in ATS format",
        "Improve my summary section",
        "Strengthen my project descriptions",
        "What skills should I add?",
        "Give mock interview questions"
      ];
      if (mode === "study") return [
        "Make it a 14-day plan",
        "Suggest YouTube resources",
        "Create daily checklist",
        "Give revision questions"
      ];
      if (mode === "projects") return [
        "Give beginner-friendly projects",
        "Give AI-based projects",
        "Make it placement-oriented",
        "Add GitHub portfolio ideas"
      ];
      return [
        "Help me with my roadmap",
        "Suggest resources",
        "Explain with examples"
      ];
    }

    // ✅ Safe JSON fetch helper (prevents JSON parse crashes)
    async function fetchJson(url, options) {
      const resp = await fetch(url, options);
      const raw = await resp.text();

      if (!raw) {
        throw new Error(`Empty response (status ${resp.status}). Backend might be down or crashed.`);
      }

      let data;
      try {
        data = JSON.parse(raw);
      } catch {
        throw new Error(`Non-JSON response (status ${resp.status}): ${raw.slice(0, 200)}`);
      }

      if (!resp.ok) {
        throw new Error(data?.error || `API Error (status ${resp.status})`);
      }

      return data;
    }

    async function fetchAIResponse(prompt) {
      const data = await fetchJson(`${BACKEND_BASE}/api/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: prompt,
          history: chatHistory,
          mode: currentMode
        }),
      });

      chatHistory.push({ role: "user", parts: [{ text: prompt }] });
      chatHistory.push({ role: "model", parts: [{ text: data.reply }] });

      return data.reply;
    }

    pdfBtn.onclick = () => pdfInput.click();

    pdfInput.onchange = async () => {
      const file = pdfInput.files?.[0];
      if (!file) return;

      addBubble(`Uploading PDF: ${file.name} 📄`, 'user');
      const loading = addLoading();

      try {
        const form = new FormData();
        form.append("pdf", file);

        const data = await fetchJson(`${BACKEND_BASE}/api/summarize-pdf`, {
          method: "POST",
          body: form
        });

        loading.remove();

        const aiDiv = addEmptyAIBubble();
        await typewriter(aiDiv, data.summary, 3);

        if (data.used_ocr) {
          addBubble("OCR mode was used ✅ (scanned/image PDF detected)", "ai");
        }

        addSuggestions([
          "Summarize in 10 lines",
          "Make short notes",
          "Create 10 MCQs from this",
          "Give important questions",
          "Do you want any changes?"
        ]);

      } catch (e) {
        if (loading) loading.remove();
        addBubble(`PDF Error: ${e.message}`, 'error');
      } finally {
        pdfInput.value = "";
      }
    };

    async function handleSend() {
      const text = userInput.value.trim();
      if (!text || isBusy) return;

      addBubble(text, 'user');
      userInput.value = '';
      userInput.disabled = true;
      sendBtn.disabled = true;
      isBusy = true;

      const loading = addLoading();

      try {
        const aiText = await fetchAIResponse(text);
        loading.remove();

        const aiDiv = addEmptyAIBubble();
        await typewriter(aiDiv, aiText, 4);

        addSuggestions(suggestionsForMode(currentMode));

      } catch (err) {
        if (loading) loading.remove();
        addBubble(`Connection Error: ${err.message}`, 'error');
      } finally {
        isBusy = false;
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    function addBubble(text, sender) {
      const div = document.createElement('div');
      div.className = sender === 'error'
        ? 'error-message'
        : `message-bubble ${sender}-message`;
      div.textContent = cleanText(text);
      chatMessages.appendChild(div);
      chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
      return div;
    }

    function addEmptyAIBubble() {
      const div = document.createElement('div');
      div.className = `message-bubble ai-message`;
      div.textContent = "";
      chatMessages.appendChild(div);
      chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
      return div;
    }

    function addLoading() {
      const div = document.createElement('div');
      div.className = 'ai-message message-bubble dots';
      div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      chatMessages.appendChild(div);
      chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
      return div;
    }

    sendBtn.onclick = handleSend;
    userInput.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    };
  </script>
</body>
</html>
