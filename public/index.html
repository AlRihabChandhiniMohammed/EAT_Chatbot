<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edualttech AI Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background:#f8fafc; margin:0; height:100vh; overflow:hidden; }
    #chatbot-container { position:fixed; bottom:24px; right:24px; width:95%; max-width:430px; height:650px; background:#fff; border-radius:1.5rem; box-shadow:0 10px 30px rgba(0,0,0,0.15); display:flex; flex-direction:column; overflow:hidden; }
    #chat-header { padding:1rem; background:linear-gradient(145deg,#6c5ce7,#00b894); color:#fff; }
    #chat-messages { flex:1; padding:1rem; overflow-y:auto; display:flex; flex-direction:column; gap:1rem; background:#f8fafc; }
    .bubble { padding:.7rem 1rem; border-radius:1rem; max-width:85%; white-space:pre-wrap; }
    .user { background:#4c70ff; color:#fff; align-self:flex-end; }
    .ai { background:#e2e8f0; color:#111; align-self:flex-start; }
    .error { background:#fee2e2; color:#b91c1c; align-self:center; font-size:.85rem; }
    #input-box { display:flex; gap:.5rem; padding:.7rem; border-top:1px solid #e2e8f0; }
    #user-input { flex:1; padding:.6rem 1rem; border-radius:9999px; border:1px solid #ccc; }
    button { cursor:pointer; }
  </style>
</head>

<body>

<div id="chatbot-container">

  <div id="chat-header">
    <h3 class="font-bold text-lg">Edualttech AI</h3>
    <p class="text-xs opacity-80">Learn Beyond Books • <span id="mode-label">General</span></p>
  </div>

  <div id="chat-messages">
    <div class="bubble ai">
      Welcome! 👋 Upload a PDF 📄 or ask anything.
    </div>
  </div>

  <div id="input-box">
    <button id="pdf-btn">📄</button>
    <input type="file" id="pdf-input" accept="application/pdf" style="display:none" />
    <input type="text" id="user-input" placeholder="Type your message..." />
    <button id="send-btn" class="bg-indigo-600 text-white px-3 rounded-full">➤</button>
  </div>

</div>

<script>
/* =========================
   CONFIG
========================= */
const BACKEND_BASE = ""; // same domain

/* =========================
   ELEMENTS
========================= */
const chat = document.getElementById("chat-messages");
const input = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const pdfBtn = document.getElementById("pdf-btn");
const pdfInput = document.getElementById("pdf-input");

let chatHistory = [];
let currentMode = "general";

/* =========================
   UTILS
========================= */

function addBubble(text, type="ai") {
  const div = document.createElement("div");
  div.className = `bubble ${type}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function fetchJSON(url, options) {
  const res = await fetch(url, options);
  const raw = await res.text();

  if (!raw) throw new Error("Empty response from server");

  let data;
  try { data = JSON.parse(raw); }
  catch { throw new Error(raw.slice(0,200)); }

  if (!res.ok) throw new Error(data.error || "API Error");

  return data;
}

/* =========================
   CHAT
========================= */

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addBubble(text, "user");
  input.value = "";

  try {
    const data = await fetchJSON(`${BACKEND_BASE}/api/chat`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        message: text,
        history: chatHistory,
        mode: currentMode
      })
    });

    chatHistory.push({role:"user", parts:[{text}]});
    chatHistory.push({role:"model", parts:[{text:data.reply}]});

    addBubble(data.reply, "ai");
  }
  catch(e){
    addBubble("Connection Error: " + e.message, "error");
  }
}

sendBtn.onclick = sendMessage;
input.onkeydown = e => { if(e.key==="Enter") sendMessage(); };

/* =========================
   PDF UPLOAD
========================= */

pdfBtn.onclick = () => pdfInput.click();

pdfInput.onchange = async () => {
  const file = pdfInput.files[0];
  if (!file) return;

  addBubble("Uploading PDF: " + file.name, "user");

  const form = new FormData();
  form.append("pdf", file);

  try {
    const data = await fetchJSON(`${BACKEND_BASE}/api/summarize-pdf`, {
      method: "POST",
      body: form
    });

    addBubble(data.summary, "ai");
  }
  catch(e){
    addBubble("PDF Error: " + e.message, "error");
  }

  pdfInput.value = "";
};

</script>

</body>
</html>
